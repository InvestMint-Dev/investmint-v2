name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        env:
          VITE_BANKING_API_URL: ${{ secrets.VITE_BANKING_API_URL }}
          VITE_CASHFLOW_API_URL: ${{ secrets.VITE_CASHFLOW_API_URL }}
          VITE_UNIFIED_WORKSPACE_ID: ${{ secrets.VITE_UNIFIED_WORKSPACE_ID }}
          VITE_BASE_PATH: /investmint-v2/
        run: npm run build

      - name: Add SPA redirect for React Router
        run: cp frontend/dist/index.html frontend/dist/404.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - uses: actions/deploy-pages@v4
        id: deployment
